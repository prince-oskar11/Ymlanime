<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>YmlAnime</title>
<link rel="manifest" href="manifest.json" />
<style>
  body {
    margin: 0;
    font-family: Arial, sans-serif;
    background-color: #222;
    color: #fff;
  }

  header {
    display: flex;
    align-items: center;
    padding: 10px;
    background: #111;
    position: sticky;
    top: 0;
    z-index: 999;
  }

  .icon {
    margin: 0 10px;
    cursor: pointer;
    font-size: 20px;
  }

  #search-container {
    flex: 1;
    display: flex;
    align-items: center;
  }

  #search-input {
    width: 60%;
    padding: 5px 10px;
    border: none;
    border-radius: 4px;
  }

  #install-btn {
    margin-left: 10px;
    padding: 5px 10px;
    background-color: #4CAF50;
    border: none;
    border-radius: 4px;
    cursor: pointer;
  }

  main {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    padding: 10px;
  }

  .poster {
    position: relative;
    width: 200px;
    margin: 10px;
    cursor: pointer;
    border-radius: 8px;
    overflow: hidden;
    background: #333;
  }

  .poster img {
    width: 100%;
    display: block;
  }

  .poster-info {
    position: absolute;
    top: 8px;
    left: 8px;
    right: 8px;
    display: flex;
    justify-content: space-between;
    font-size: 12px;
    color: #fff;
  }

  .heart {
    position: absolute;
    top: 8px;
    right: 8px;
    font-size: 20px;
    cursor: pointer;
  }

  .bottom-left {
    position: absolute;
    bottom: 8px;
    left: 8px;
    font-size: 12px;
    display: flex;
    flex-direction: column;
  }

  /* Modal styles */
  .modal {
    display: none;
    position: fixed;
    z-index: 9999;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: rgba(0,0,0,0.6);
    align-items: center;
    justify-content: center;
  }

  .modal-content {
    background: #222;
    padding: 20px;
    border-radius: 8px;
    max-width: 400px;
    width: 90%;
  }

  #video-player {
    width: 100%;
    max-height: 70vh;
  }

  button {
    margin-top: 10px;
    padding: 8px 12px;
    border: none;
    border-radius: 4px;
    background-color: #4CAF50;
    cursor: pointer;
  }

  #profile-section {
    display: flex;
    flex-direction: column;
  }

  #profile-section input {
    margin: 5px 0;
    padding: 5px;
  }

</style>
</head>
<body>

<header>
  <div class="icon" id="home-icon" title="Home">🏠</div>
  <div class="icon" id="wishlist-icon" title="Wishlist">❤️</div>
  <div class="icon" id="genres-icon" title="Genres">🎞️</div>
  <div id="search-container">
    <input type="text" id="search-input" placeholder="YmlAnime..." />
    <button id="install-btn">Install</button>
  </div>
  <div class="icon" id="profile-icon" title="Profile">👤</div>
</header>

<main id="content">
  <!-- Posters will be dynamically inserted here -->
</main>

<!-- Trailer Modal -->
<div id="trailer-modal" class="modal">
  <div class="modal-content">
    <video id="video-player" controls autoplay></video>
    <button id="close-trailer">Close</button>
  </div>
</div>

<!-- Wishlist Modal -->
<div id="wishlist-modal" class="modal">
  <div class="modal-content">
    <h3>Add to Wishlist</h3>
    <p id="wishlist-show-title"></p>
    <button id="add-wishlist">Add</button>
    <button id="cancel-wishlist">Cancel</button>
  </div>
</div>

<!-- Profile Modal -->
<div id="profile-modal" class="modal">
  <div class="modal-content" id="profile-section">
    <div id="sign-in-section">
      <h3>Sign In</h3>
      <input type="text" id="username" placeholder="Username" />
      <input type="password" id="password" placeholder="Password" />
      <button id="sign-in-btn">Sign In</button>
    </div>
    <div id="profile-actions" style="display:none;">
      <h3>Profile</h3>
      <button id="sign-out-btn">Sign Out</button>
      <button id="clear-history">Clear History</button>
    </div>
  </div>
</div>

<script>
  // Sample data
  const shows = [
    {
      id: 1,
      title: "Attack on Titan",
      episodes: 75,
      rating: 9.0,
      age: "16+",
      subDub: "Sub",
      trailer: "https://www.w3schools.com/html/mov_bbb.mp4",
      streams: ["Filemoon", "StreamSB", "Mp4Upload", "DoodStream"],
      mostRated: true,
      backgroundUrl: "https://images.alphacoders.com/123/12345.jpg"
    },
    {
      id: 2,
      title: "My Hero Academia",
      episodes: 88,
      rating: 8.5,
      age: "13+",
      subDub: "Dub",
      trailer: "https://www.w3schools.com/html/movie.mp4",
      streams: ["Filemoon", "StreamSB"],
      mostRated: false,
      backgroundUrl: "https://images.alphacoders.com/543/54321.jpg"
    },
    // Add more shows as needed
  ];

  let currentBackground = '';

  const content = document.getElementById('content');

  // Load shows
  function loadShows(showsToLoad) {
    content.innerHTML = '';
    showsToLoad.forEach(show => {
      const posterDiv = document.createElement('div');
      posterDiv.className = 'poster';
      posterDiv.dataset.id = show.id;
      posterDiv.dataset.title = show.title;
      posterDiv.dataset.trailer = show.trailer;
      posterDiv.dataset.subdub = show.subDub;
      posterDiv.dataset.streams = show.streams.join(',');

      // Poster image
      const img = document.createElement('img');
      img.src = show.backgroundUrl;
      img.alt = show.title;
      posterDiv.appendChild(img);

      // Info overlay
      const info = document.createElement('div');
      info.className = 'poster-info';

      const epDiv = document.createElement('div');
      epDiv.innerText = `Eps: ${show.episodes}`;
      info.appendChild(epDiv);

      const rateDiv = document.createElement('div');
      rateDiv.innerText = `Rating: ${show.rating}`;
      info.appendChild(rateDiv);

      const ageDiv = document.createElement('div');
      ageDiv.innerText = show.age;
      info.appendChild(ageDiv);

      posterDiv.appendChild(info);

      // Heart icon
      const heart = document.createElement('div');
      heart.className = 'heart';
      heart.innerHTML = '🤍';
      heart.title = 'Add to Wishlist';
      posterDiv.appendChild(heart);

      // Bottom-left info
      const bottomLeft = document.createElement('div');
      bottomLeft.className = 'bottom-left';
      bottomLeft.innerHTML = `<div>MostRated: ${show.mostRated}</div><div>Age: ${show.age}</div>`;
      posterDiv.appendChild(bottomLeft);

      // Event listeners
      posterDiv.addEventListener('click', () => {
        showPosterOptions(show);
      });
      heart.addEventListener('click', (e) => {
        e.stopPropagation();
        toggleWishlist(show.id, heart);
      });

      content.appendChild(posterDiv);
    });
    // Change background
    changeBackground(showsToLoad);
  }

  function changeBackground(showsToLoad) {
    const mostRatedShow = showsToLoad.find(s => s.mostRated);
    const url = mostRatedShow ? mostRatedShow.backgroundUrl : 'https://via.placeholder.com/1200x800?text=YmlAnime';
    document.body.style.backgroundImage = `url(${url})`;
    document.body.style.backgroundSize = 'cover';
  }

  // Show options modal (simplified)
  function showPosterOptions(show) {
    const options = confirm(`Options for ${show.title}:\nClick OK to Play Trailer\nCancel to do nothing.`);
    if (options) {
      playTrailer(show.trailer);
    }
  }

  // Play trailer
  function playTrailer(src) {
    const modal = document.getElementById('trailer-modal');
    const video = document.getElementById('video-player');
    video.src = src;
    modal.style.display = 'flex';
  }

  document.getElementById('close-trailer').addEventListener('click', () => {
    document.getElementById('trailer-modal').style.display = 'none';
  });

  // Toggle wishlist
  const wishlist = JSON.parse(localStorage.getItem('wishlist')) || [];
  function toggleWishlist(showId, heartIcon) {
    const index = wishlist.indexOf(showId);
    if (index === -1) {
      wishlist.push(showId);
      heartIcon.innerHTML = '❤️';
    } else {
      wishlist.splice(index, 1);
      heartIcon.innerHTML = '🤍';
    }
    localStorage.setItem('wishlist', JSON.stringify(wishlist));
  }

  // Search filter
  document.getElementById('search-input').addEventListener('input', () => {
    const query = document.getElementById('search-input').value.toLowerCase();
    document.querySelectorAll('.poster').forEach(p => {
      const title = p.dataset.title.toLowerCase();
      p.style.display = title.includes(query) ? 'block' : 'none';
    });
  });

  // Install App
  document.getElementById('install-btn').addEventListener('click', () => {
    alert('Install feature coming soon');
  });

  // Profile Management
  const profileIcon = document.getElementById('profile-icon');
  profileIcon.addEventListener('click', () => {
    document.getElementById('profile-modal').style.display = 'flex';
  });

  document.getElementById('sign-in-btn').addEventListener('click', () => {
    const username = document.getElementById('username').value;
    if (username) {
      localStorage.setItem('user', username);
      document.getElementById('profile-modal').style.display = 'none';
      document.getElementById('sign-in-section').style.display = 'none';
      document.getElementById('profile-actions').style.display = 'block';
    }
  });

  document.getElementById('sign-out-btn').addEventListener('click', () => {
    localStorage.removeItem('user');
    document.getElementById('profile-modal').style.display = 'none';
    document.getElementById('sign-in-section').style.display = 'block';
    document.getElementById('profile-actions').style.display = 'none';
  });

  document.getElementById('clear-history').addEventListener('click', () => {
    if (confirm('Clear watch history?')) {
      localStorage.removeItem('history');
    }
  });

  // Initialize
  window.onload = () => {
    loadShows(shows);
    // Check login state
    const user = localStorage.getItem('user');
    if (user) {
      document.getElementById('sign-in-section').style.display = 'none';
      document.getElementById('profile-actions').style.display = 'block';
    }
  };
</script>

<!-- Service Worker registration -->
<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('sw.js').then(reg => {
        console.log('SW registered', reg);
      });
    });
  }
</script>

</body>
</html>
