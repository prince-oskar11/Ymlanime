<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YmlAnime</title>

<style>
body { margin:0; font-family:sans-serif; background:#000; color:#fff; }

/* HEADER */
header {
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:1rem;
  background:#111;
}
.logo { color:#00ff88; font-size:22px; font-weight:bold; }
.search { padding:6px; border-radius:4px; border:none; width:200px; }
.icons span { margin-left:15px; cursor:pointer; font-size:20px; }

/* HERO */
.hero {
  height:60vh;
  background-size:cover;
  background-position:center;
  display:flex;
  align-items:flex-end;
  padding:2rem;
}
.hero h1 { font-size:40px; margin:0; }
.hero p { max-width:500px; }

/* ROWS */
.row { padding:1rem; }
.row h2 { margin-bottom:10px; }
.row-container {
  display:flex;
  overflow-x:auto;
  gap:10px;
}

/* CARDS */
.card {
  min-width:150px;
  position:relative;
  cursor:pointer;
  transition:0.3s;
}
.card img {
  width:100%;
  border-radius:6px;
}
.card:hover {
  transform:scale(1.1);
}

/* OVERLAY */
.overlay {
  position:absolute;
  inset:0;
  background:rgba(0,0,0,0.7);
  opacity:0;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  transition:0.3s;
}
.card:hover .overlay { opacity:1; }

.play {
  background:#00ff88;
  color:#000;
  padding:5px 10px;
  border-radius:4px;
  margin-bottom:5px;
}

.heart {
  position:absolute;
  top:5px;
  right:5px;
}
</style>
</head>

<body>

<header>
  <div>
    <span class="logo">YmlAnime</span>
    <input id="search" class="search" placeholder="Search...">
  </div>
  <div class="icons">
    <span onclick="goHome()">🏠</span>
    <span onclick="showWishlist()">❤️</span>
    <span onclick="alert('Genres soon')">🎭</span>
    <span onclick="alert('Profile soon')">👤</span>
  </div>
</header>

<!-- HERO -->
<div class="hero" id="hero">
  <div>
    <h1 id="heroTitle"></h1>
    <p id="heroDesc"></p>
  </div>
</div>

<!-- ROWS -->
<div id="content"></div>

<script>
// DATA
const anime = [
  {id:1,title:'Attack on Titan',desc:'Humanity fights titans.',img:'https://cdn.myanimelist.net/images/anime/10/47347.jpg'},
  {id:2,title:'Jujutsu Kaisen',desc:'Curses and sorcerers.',img:'https://cdn.myanimelist.net/images/anime/1171/109222.jpg'},
  {id:3,title:'Spy x Family',desc:'Fake family mission.',img:'https://cdn.myanimelist.net/images/anime/1441/122795.jpg'},
  {id:4,title:'Chainsaw Man',desc:'Devils and chaos.',img:'https://cdn.myanimelist.net/images/anime/1939/136859.jpg'}
];

// STORAGE
let wishlist = JSON.parse(localStorage.getItem('wishlist')||'[]');

// HERO SET
function setHero(a){
  document.getElementById('hero').style.backgroundImage=`url(${a.img})`;
  document.getElementById('heroTitle').innerText=a.title;
  document.getElementById('heroDesc').innerText=a.desc;
}
setHero(anime[0]);

// ROW RENDER
function createRow(title,list){
  const row=document.createElement('div');
  row.className='row';

  row.innerHTML=`<h2>${title}</h2><div class="row-container"></div>`;
  const container=row.querySelector('.row-container');

  list.forEach(a=>{
    const card=document.createElement('div');
    card.className='card';

    card.innerHTML=`
      <img src="${a.img}">
      <div class="overlay">
        <div class="play">▶ Play</div>
        <div>${a.title}</div>
      </div>
      <span class="heart">${wishlist.includes(a.id)?'💚':'🤍'}</span>
    `;

    // click → hero update
    card.onclick=()=>setHero(a);

    // wishlist
    card.querySelector('.heart').onclick=(e)=>{
      e.stopPropagation();
      if(wishlist.includes(a.id)) wishlist=wishlist.filter(i=>i!==a.id);
      else wishlist.push(a.id);
      localStorage.setItem('wishlist',JSON.stringify(wishlist));
      load();
    };

    container.appendChild(card);
  });

  return row;
}

// LOAD PAGE
function load(){
  const content=document.getElementById('content');
  content.innerHTML='';
  content.appendChild(createRow('Most Rated',anime));
  content.appendChild(createRow('Trending',anime));
  content.appendChild(createRow('Airing Now',anime));
  content.appendChild(createRow('Upcoming',anime));
}
load();

// NAV
function goHome(){ load(); }

function showWishlist(){
  const content=document.getElementById('content');
  content.innerHTML='';
  content.appendChild(createRow('Wishlist',anime.filter(a=>wishlist.includes(a.id))));
}

// SEARCH
document.getElementById('search').addEventListener('input',e=>{
  const val=e.target.value.toLowerCase();
  const filtered=anime.filter(a=>a.title.toLowerCase().includes(val));
  const content=document.getElementById('content');
  content.innerHTML='';
  content.appendChild(createRow('Search Results',filtered));
});
</script>

</body>
</html>
