<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>YMLAnime</title>

  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#0f172a"/>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0f172a;
      color: white;
    }
    header {
      padding: 1rem;
      font-size: 1.5rem;
      font-weight: bold;
    }
    input {
      width: 90%;
      padding: 10px;
      margin: 10px;
      border-radius: 8px;
      border: none;
    }
    .card {
      background: #1e293b;
      margin: 10px;
      padding: 10px;
      border-radius: 10px;
    }
    video {
      width: 100%;
      margin-top: 10px;
    }
  </style>
</head>
<body>

<header>YMLAnime</header>

<input id="search" placeholder="Search anime..." />
<div id="results"></div>

<script>
const resultsDiv = document.getElementById("results");

document.getElementById("search").addEventListener("change", async (e) => {
  const query = e.target.value;

  const res = await fetch(`https://api.jikan.moe/v4/anime?q=${query}`);
  const data = await res.json();

  resultsDiv.innerHTML = "";

  data.data.forEach(anime => {
    const div = document.createElement("div");
    div.className = "card";

    div.innerHTML = `
      <h3>${anime.title}</h3>
      <img src="${anime.images.jpg.image_url}" width="100%" />
      <button onclick="playSample()">Play</button>
    `;

    resultsDiv.appendChild(div);
  });
});

function playSample() {
  const video = document.createElement("video");
  video.controls = true;

  // ⚠️ Replace with your own LEGAL stream
  video.src = "https://test-streams.mux.dev/x36xhzz/x36xhzz.m3u8";

  resultsDiv.innerHTML = "";
  resultsDiv.appendChild(video);
}
</script>

<script>
if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("sw.js");
}
</script>

</body>
</html>
