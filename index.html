<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>YMLANIME | Netflix Style</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet" />
<link rel="stylesheet" href="https://cdn.plyr.io/3.7.8/plyr.css" />
<script src="https://cdn.plyr.io/3.7.8/plyr.js"></script>
<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
  body {
    background: #141414;
    font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
    font-size: 14px;
    margin: 0;
    overflow-x: hidden;
    -webkit-tap-highlight-color: transparent;
  }
  /* Custom scrollbar hide */
  .hide-scrollbar::-webkit-scrollbar { display: none; }

  /* Hide scrollbars for overflow containers */
  .hide-scrollbar {
    -ms-overflow-style: none; /* IE and Edge */
    scrollbar-width: none; /* Firefox */
  }

  /* Scrollbar styling for Chrome, Safari, etc. */
  .hide-scrollbar::-webkit-scrollbar {
    display: none;
  }

  /* Card styles */
  .anime-card {
    min-width: 180px;
    border-radius: 8px;
    overflow: hidden;
    background-color: #222;
    transition: transform 0.3s, box-shadow 0.3s;
    cursor: pointer;
  }
  .anime-card:hover {
    transform: scale(1.05);
    box-shadow: 0 10px 20px rgba(0,0,0,0.5);
  }
  .card-img {
    width: 100%;
    aspect-ratio: 2/3;
    object-fit: cover;
  }
  .rating-badge {
    position: absolute;
    top: 8px;
    left: 8px;
    background: rgba(255, 0, 0, 0.8);
    padding: 2px 6px;
    border-radius: 4px;
    font-size: 12px;
    font-weight: bold;
  }
</style>
</head>
<body class="text-gray-200">

<!-- Navbar -->
<nav class="fixed top-0 w-full z-50 bg-black bg-opacity-70 px-8 py-4 flex items-center justify-between backdrop-blur-lg">
  <div class="flex items-center space-x-4">
    <div class="text-red-600 text-3xl font-bold cursor-pointer" onclick="showPage('home')">YMLSFLIX</div>
  </div>
  <div class="flex items-center space-x-6 text-white text-xl">
    <i class="fa fa-search cursor-pointer" onclick="showPage('search')"></i>
    <i class="fa fa-bell cursor-pointer"></i>
    <i class="fa fa-user-circle cursor-pointer" onclick="toggleDropdown('profileDrop')"></i>
  </div>
</nav>

<!-- Hero Banner -->
<header id="hero" class="mt-16 h-[60vh] bg-cover bg-center relative rounded-lg overflow-hidden shadow-lg" style="background-image: url('https://images.unsplash.com/photo-1506744038136-46273834b3fb?ixlib=rb-4.0.3&auto=format&fit=crop&w=1920&q=80');">
  <div class="absolute inset-0 bg-black bg-opacity-50 flex flex-col items-center justify-center text-center p-4">
    <h2 class="text-4xl md:text-5xl font-bold text-white mb-4 uppercase max-w-3xl">Discover the Best Anime & Movies</h2>
    <div class="flex gap-4 mt-4">
      <button class="bg-red-600 text-white px-8 py-3 rounded-lg font-bold uppercase hover:bg-red-700 transition">Stream Now</button>
      <button class="bg-gray-800 text-white px-8 py-3 rounded-lg font-bold uppercase hover:bg-gray-700 transition">Watch Trailer</button>
    </div>
  </div>
</header>

<!-- Main Content -->
<main class="mt-8 px-4">
  <!-- Trending Now -->
  <section class="mb-8">
    <h2 class="text-white text-xl font-bold mb-4 uppercase border-l-4 border-red-600 pl-2">Trending Now</h2>
    <div class="flex space-x-4 overflow-x-auto pb-4 hide-scrollbar" id="trendingGrid">
      <!-- Rendered cards will appear here -->
    </div>
  </section>
  <!-- Top Rated -->
  <section class="mb-8">
    <h2 class="text-white text-xl font-bold mb-4 uppercase border-l-4 border-red-600 pl-2">Top Rated</h2>
    <div class="flex space-x-4 overflow-x-auto pb-4 hide-scrollbar" id="ratedGrid"></div>
  </section>
  <!-- Now Playing -->
  <section class="mb-8">
    <h2 class="text-white text-xl font-bold mb-4 uppercase border-l-4 border-red-600 pl-2">Now Playing</h2>
    <div class="flex space-x-4 overflow-x-auto pb-4 hide-scrollbar" id="airingGrid"></div>
  </section>
  <!-- Popular -->
  <section class="mb-8">
    <h2 class="text-white text-xl font-bold mb-4 uppercase border-l-4 border-red-600 pl-2">Most Popular</h2>
    <div class="flex space-x-4 overflow-x-auto pb-4 hide-scrollbar" id="popularGrid"></div>
  </section>
  <!-- Upcoming -->
  <section class="mb-8">
    <h2 class="text-white text-xl font-bold mb-4 uppercase border-l-4 border-red-600 pl-2">Upcoming</h2>
    <div class="flex space-x-4 overflow-x-auto pb-4 hide-scrollbar" id="upcomingGrid"></div>
  </section>
<main class="container mx-auto p-6 space-y-20">
            <section id="continueSection" class="hidden">
                <div class="flex items-center justify-between mb-6">
                    <h2 class="text-[11px] font-black uppercase text-red-500 tracking-[0.4em]">Jump Back In</h2>
                    <span class="text-[9px] text-gray-600 font-bold uppercase">Auto-Saved</span>
                </div>
                <div id="continueGrid" class="flex gap-6 overflow-x-auto no-scrollbar pb-3"></div>
            </section>
            <section class="mb-12"><h2 class="text-[11px] font-black mb-4 uppercase text-orange-500 tracking-[0.2em]">Trending Now</h2><div id="trendingGrid" class="flex gap-4 overflow-x-auto no-scrollbar"></div></section>
            <section class="mb-12"><h2 class="text-[11px] font-black mb-4 uppercase text-yellow-500 tracking-[0.2em]">Top Rated</h2><div id="ratedGrid" class="flex gap-4 overflow-x-auto no-scrollbar"></div></section>
            <section class="mb-12"><h2 class="text-[11px] font-black mb-4 uppercase text-blue-500 tracking-[0.2em]">Now Playing</h2><div id="airingGrid" class="flex gap-4 overflow-x-auto no-scrollbar"></div></section>
            <section class="mb-12"><h2 class="text-[11px] font-black mb-4 uppercase text-purple-500 tracking-[0.2em]">Most Popular</h2><div id="popularGrid" class="flex gap-4 overflow-x-auto no-scrollbar"></div></section>
            <section class="mb-12"><h2 class="text-[11px] font-black mb-4 uppercase text-green-500 tracking-[0.2em]">Upcoming</h2><div id="upcomingGrid" class="flex gap-4 overflow-x-auto no-scrollbar"></div></section>
</main>
<script>
  // Simplified example: replace your fetch and render logic with new style

  // Example data to populate cards (replace with your actual fetch functions)
  const sampleData = [
    {
      id: 1,
      title: { english: "Sample Anime" },
      coverImage: { large: "https://via.placeholder.com/300x450" },
      episodes: 12,
      rating: "8.5",
    },
    {
      id: 2,
      title: { english: "Another Anime" },
      coverImage: { large: "https://via.placeholder.com/300x450" },
      episodes: 24,
      rating: "9.0",
    }
  ];

  // Example function to render cards
  function renderCategory(gridId, data) {
    document.getElementById(gridId).innerHTML = data.map(a => `
      <div class="anime-card relative" onclick='showChoice(${JSON.stringify(a)})'>
        <div class="relative">
          <img src="${a.coverImage.large}" class="card-img" />
          <div class="rating-badge">${a.rating || 'NA'}</div>
        </div>
        <div class="p-2 text-white text-sm truncate">${a.title.english || a.title.romaji}</div>
      </div>
    `).join('');
  }

  // Populate with sample data
  renderCategory('trendingGrid', sampleData);
  renderCategory('ratedGrid', sampleData);
  renderCategory('airingGrid', sampleData);
  renderCategory('popularGrid', sampleData);
  renderCategory('upcomingGrid', sampleData);
</script>
</body>
</html>
